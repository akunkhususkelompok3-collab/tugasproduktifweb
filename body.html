<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>tuniel.id</title>

  <!-- font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins', sans-serif;
    }

    body{
      width:100%;
      height:100vh;
      background:#edf6fb;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
    }

    .container{
      width:92%;
      height:92vh;
      background:rgba(255,255,255,0.92);
      border-radius:42px;
      position:relative;
      overflow:hidden;
      display:flex;
      padding:35px;
      box-shadow:0 12px 35px rgba(0,0,0,0.08);
    }

    /* navbar */

    .navbar{
      position:absolute;
      top:28px;
      left:42px;
      display:flex;
      gap:28px;
    }

    .navbar a{
      text-decoration:none;
      color:#8e8e8e;
      font-size:13px;
      font-weight:500;
    }

    /* logo */

    .logo{
      position:absolute;
      top:28px;
      right:42px;
      color:#7db7d8;
      font-size:16px;
      font-weight:700;
    }

    /* kiri */

    .left{
      width:58%;
      height:100%;
      display:flex;
      align-items:center;
      gap:38px;
      position:relative;
    }

    /* vinyl area */

    .vinyl-area{
      position:relative;
      width:430px;
      height:430px;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    /* lingkar luar */

    .circle{
      width:430px;
      height:430px;
      border-radius:50%;
      border:7px solid #d3e9f6;
      border-top:7px solid #90c3de;
      position:absolute;
    }

    /* durasi */

    .duration{
      position:absolute;
      right:-5px;
      top:50%;
      transform:translateY(-50%);
      font-size:14px;
      color:#8db8d1;
      font-weight:500;
      background:white;
      padding:5px 10px;
      border-radius:12px;
      z-index:10;
    }

    /* piring hitam */

    .vinyl{
      width:350px;
      height:350px;
      border-radius:50%;
      background:
      radial-gradient(circle at center,
      white 0%,
      white 12%,
      #101010 13%,
      black 100%);
      position:relative;
      animation:spin 8s linear infinite;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
    }

    .vinyl::before{
      content:"";
      position:absolute;
      width:100%;
      height:100%;
      border-radius:50%;

      background:
      repeating-radial-gradient(
      circle,
      rgba(255,255,255,0.05) 0px,
      rgba(255,255,255,0.05) 2px,
      transparent 3px,
      transparent 8px
      );
    }

    .vinyl::after{
      content:"";
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      width:22px;
      height:22px;
      border-radius:50%;
      background:#d9f1ff;
    }

    @keyframes spin{
      from{
        transform:rotate(0deg);
      }

      to{
        transform:rotate(360deg);
      }
    }

    /* tombol */

    .controls{
      position:absolute;
      bottom:65px;
      left:45px;
      display:flex;
      gap:12px;
    }

    .controls button{
      width:56px;
      height:56px;
      border:none;
      border-radius:18px;
      background:#9ec9df;
      color:white;
      font-size:22px;
      cursor:pointer;
      transition:0.3s;
      box-shadow:0 8px 18px rgba(0,0,0,0.08);
    }

    .controls button:hover{
      transform:scale(1.05);
    }

    /* info lagu */

    .music-info{
      width:240px;
    }

    .music-info h1{
      font-size:58px;
      line-height:1;
      color:#a8d1e8;
      font-weight:700;
      margin-bottom:8px;
      text-transform:capitalize;
    }

    .artist{
      font-size:20px;
      color:#777;
      font-weight:400;
      margin-bottom:28px;
    }

    .save-btn{
      padding:13px 22px;
      border:none;
      border-radius:16px;
      background:#e5f5ff;
      color:#77afce;
      font-size:13px;
      font-weight:500;
      cursor:pointer;
      transition:0.3s;
    }

    .save-btn:hover{
      background:#d5efff;
    }

    /* kanan */

    .right{
      width:42%;
      padding-top:88px;
      padding-left:8px;
    }

    .playlist-title{
      font-size:55px;
      color:#a8d1e8;
      font-weight:700;
      line-height:1;
      margin-bottom:26px;
    }

    .playlist{
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    .song{
      width:100%;
      background:#f5f5f5;
      border-radius:24px;
      padding:16px;
      display:flex;
      align-items:center;
      gap:15px;
      cursor:pointer;
      transition:0.3s;
    }

    .song:hover{
      border:3px solid #a8d1e8;
      transform:translateX(4px);
    }

    .song img{
      width:56px;
      height:56px;
      border-radius:14px;
      object-fit:cover;
    }

    .song h3{
      font-size:16px;
      color:#5f5f5f;
      font-weight:600;
      margin-bottom:2px;
      text-transform:capitalize;
    }

    .song p{
      font-size:12px;
      color:#999;
      text-transform:capitalize;
    }

    /* search */

    .search-box{
      position:absolute;
      bottom:26px;
      left:50%;
      transform:translateX(-50%);
      width:490px;
      background:#9fc8df;
      padding:14px 18px;
      border-radius:28px;
      display:flex;
      align-items:center;
      gap:14px;
    }

    .search-box input{
      flex:1;
      border:none;
      outline:none;
      padding:12px 18px;
      border-radius:18px;
      font-size:13px;
      color:#666;
    }

    .search-box input::placeholder{
      color:#aaa;
    }

    .search-box button{
      border:none;
      background:white;
      color:#76afce;
      padding:11px 18px;
      border-radius:16px;
      font-size:13px;
      font-weight:600;
      cursor:pointer;
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- navbar -->

    <div class="navbar">
      <a href="#">home</a>
      <a href="#">playlist</a>
      <a href="#">music</a>
      <a href="#">favorite</a>
    </div>

    <!-- logo -->

    <div class="logo">
      tuniel.id
    </div>

    <!-- kiri -->

    <div class="left">

      <div class="vinyl-area">

        <!-- lingkar -->

        <div class="circle"></div>

        <!-- durasi -->

        <div class="duration">
          3:21
        </div>

        <!-- vinyl -->

        <div class="vinyl"></div>

      </div>

      <!-- tombol -->

      <div class="controls">

        <button>
          ❚❚
        </button>

        <button>
          ▶
        </button>

      </div>

      <!-- info musik -->

      <div class="music-info">

        <h1 id="songTitle">
          choom
        </h1>

        <div class="artist" id="artistName">
          babymonster
        </div>

        <button class="save-btn">
          save this song
        </button>

      </div>

    </div>

    <!-- kanan -->

    <div class="right">

      <div class="playlist-title">
        Playlist
      </div>

      <div class="playlist">

        <div class="song"
        onclick="changeSong('choom','babymonster')">

          <img src="https://i.pinimg.com/564x/1d/47/34/1d4734d57a0ecb6b7c22b7ecdf8f92f6.jpg">

          <div>
            <h3>choom</h3>
            <p>babymonster</p>
          </div>

        </div>

        <div class="song"
        onclick="changeSong('blue','yung kai')">

          <img src="https://i.pinimg.com/564x/5b/8f/7f/5b8f7f4a35b3c5b6b05b1fd5fbbecfcb.jpg">

          <div>
            <h3>blue</h3>
            <p>yung kai</p>
          </div>

        </div>

        <div class="song"
        onclick="changeSong('heather','conan gray')">

          <img src="https://i.pinimg.com/564x/53/e9/8b/53e98bf05fa39c7c9e4d0f1e7b67ebba.jpg">

          <div>
            <h3>heather</h3>
            <p>conan gray</p>
          </div>

        </div>

      </div>

    </div>

    <!-- search -->

    <div class="search-box">

      <input
      type="text"
      id="searchInput"
      placeholder="search music...">

      <button onclick="searchMusic()">
        search
      </button>

    </div>

  </div>

  <script>

    function changeSong(title,artist){

      document.getElementById("songTitle")
      .innerHTML = title;

      document.getElementById("artistName")
      .innerHTML = artist;

    }

    function searchMusic(){

      const song =
      document.getElementById("searchInput").value;

      if(song !== ""){

        window.open(
          "https://www.google.com/search?q="
          + song + "+music",
          "_blank"
        );

      }

    }

  </script>

</body>
</html>
