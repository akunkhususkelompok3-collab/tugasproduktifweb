<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tuniel Music</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: 'Poppins', sans-serif;
    }

    body{
      width:100%;
      height:100vh;
      background: linear-gradient(
        135deg,
        #dff4ff,
        #b8e3ff,
        #9fd5ff
      );
      overflow:hidden;
      position:relative;
    }

    /* logo kanan atas */
    .logo{
      position:absolute;
      top:30px;
      right:50px;
      font-size:18px;
      font-weight:600;
      color:#2b4f73;
      letter-spacing:1px;
    }

    /* container utama */
    .container{
      width:100%;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:80px;
    }

    /* kiri */
    .left{
      width:40%;
      display:flex;
      align-items:flex-end;
      height:100%;
    }

    /* kotak kecil */
    .card{
      width:230px;
      padding:25px;
      background:rgba(255,255,255,0.45);
      border:1px solid rgba(255,255,255,0.6);
      backdrop-filter:blur(10px);
      border-radius:25px;
      box-shadow:0 10px 30px rgba(0,0,0,0.08);
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-5px);
    }

    .card button{
      width:100%;
      padding:15px;
      border:none;
      border-radius:15px;
      background:#6bbcff;
      color:white;
      font-size:20px;
      font-weight:600;
      cursor:pointer;
      transition:0.3s;
    }

    .card button:hover{
      background:#4aaeff;
    }

    .card p{
      margin-top:15px;
      text-align:center;
      color:#3d5f7e;
      font-size:15px;
    }

    /* kanan */
    .right{
      width:50%;
      text-align:left;
    }

    .title{
      font-size:65px;
      line-height:1.1;
      color:#244d72;
      font-weight:700;
      margin-bottom:25px;
    }

    .free{
      font-size:28px;
      font-weight:700;
      color:#3b7fc2;
      margin-bottom:20px;
    }

    .desc{
      font-size:20px;
      color:#456786;
      line-height:1.8;
      width:90%;
    }

    /* lingkaran aesthetic */
    .circle1,
    .circle2{
      position:absolute;
      border-radius:50%;
      background:rgba(255,255,255,0.35);
      filter:blur(2px);
    }

    .circle1{
      width:250px;
      height:250px;
      top:-80px;
      left:-60px;
    }

    .circle2{
      width:180px;
      height:180px;
      bottom:-40px;
      right:120px;
    }

  </style>
</head>
<body>

  <div class="circle1"></div>
  <div class="circle2"></div>

  <!-- logo -->
  <div class="logo">tuniel.id</div>

  <div class="container">

    <!-- kiri -->
    <div class="left">
      <div class="card">
        <button onclick="openMusic()">
          let's try!
        </button>

        <p>
          di jamin ga nyesel
        </p>
      </div>
    </div>

    <!-- kanan -->
    <div class="right">

      <div class="title">
        Lose yourself in the music,<br>
        not the ads—all for free.
      </div>

      <div class="free">
        100% free
      </div>

      <div class="desc">
        Crystal clear sound, zero ad fatigue.<br>
        Enjoy uninterrupted vibes—log in now.
      </div>

    </div>

  </div>

  <script>
    function openMusic(){
      alert("Welcome to Tuniel Music 🎵");
      
      /* nanti bisa diganti ke link web/apk kamu */
      // window.location.href = "https://...";
    }
  </script>

</body>
</html>
